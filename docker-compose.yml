services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-billing_dev}
      POSTGRES_USER: ${POSTGRES_USER:-billing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billing} -d ${POSTGRES_DB:-billing_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app
      - go_mod_cache:/go/pkg/mod
    environment:
      DATABASE_APP_URL: postgresql://billing_app:${POSTGRES_APP_PASSWORD}@db:5432/${POSTGRES_DB:-billing_dev}?sslmode=disable
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      GO_ENV: ${GO_ENV:-development}
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080

  reporting:
    build:
      context: ./reporting
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"
    volumes:
      - ./reporting:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-billing}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-billing_dev}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  go_mod_cache:
  dashboard_node_modules:
